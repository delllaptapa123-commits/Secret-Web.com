            font-family: inherit;
            font-size: 14px;

    function kirimImpuls() {
        const inputField = document.getElementById('inputRangsangan');
        const stimulasi = inputField.value.trim().toLowerCase();
        const alur = document.getElementById('alurKesadaran');
        const organ = document.getElementById('organVisual');

        if (stimulasi === "") return;

        alur.innerHTML += `<div style="color: #e2e8f0; margin-top: 8px;">🌱 Rangsangan masuk: "${inputField.value}"</div>`;
        
        organ.classList.add('saraf-aktif');
        organ.innerText = "Saraf sedang merespon impuls...";

        setTimeout(() => {
            if (JALUR_INGATAN[stimulasi]) {
                alur.innerHTML += `<div style="color: #fc8181; padding-left: 10px; margin-top: 4px;">🧠 ${JALUR_INGATAN[stimulasi]}</div>`;
} else {
                // MEKANISME SELF LEARNING: Otak mendeteksi kalimat asing dan meminta input jawaban
                alur.innerHTML += `<div style="color: #a0aec0; padding-left: 10px; margin-top: 4px;">❓ [Saraf Bingung] Kata "${inputField.value}" asing. Ketik respon alami yang cocok untuk kata ini...</div>`;
                
                kataAsingLagiDipelajari = stimulasi;
                
                // Mengubah fungsi input dan tombol untuk mode belajar
                const tombol = document.querySelector('button');
                tombol.setAttribute('onclick', 'pelajariKataBaru()');
                tombol.innerText = "Simpan Memori";
                
                inputField.placeholder = "Ketik jawaban/respon dari kata asing tadi...";
                inputField.setAttribute('onkeydown', "if(event.key === 'Enter') pelajariKataBaru()");
            }

            organ.classList.remove('saraf-aktif');
            organ.innerText = "Otak sedang beristirahat tenang...";
            alur.scrollTop = alur.scrollHeight;
        }, 600);

        inputField.value = "";
    }

// ==========================================
    // 🧠 SEKTOR KODE BARU: SELF LEARNING (MEMORI ADAPTIF)
    // ==========================================
    let kataAsingLagiDipelajari = "";

    function pelajariKataBaru() {
        const inputField = document.getElementById('inputRangsangan');
        const jawabanBaru = inputField.value.trim();
        const alur = document.getElementById('alurKesadaran');

        if (jawabanBaru === "") return;

        // Simpan jawaban baru ke memori adaptif otak
        JALUR_INGATAN[kataAsingLagiDipelajari] = jawabanBaru;

        // Tampilkan proses pembentukan sinapsis baru di layar
        alur.innerHTML += `<div style="color: #48bb78; padding-left: 10px; margin-top: 4px;">✨ [Sinapsis Terbentuk] Ingatan baru dikunci: "${kataAsingLagiDipelajari}" -> "${jawabanBaru}"</div>`;
        
        // Kembalikan fungsi tombol ke normal
        const tombol = document.querySelector('button');
        tombol.setAttribute('onclick', 'kirimImpuls()');
        tombol.innerText = "Rangsang Otak";
        
        // Kembalikan placeholder input ke normal
        inputField.placeholder = "Berikan rangsangan kata...";
        inputField.setAttribute('onkeydown', "if(event.key === 'Enter') kirimImpuls()");
        inputField.value = "";
        
        kataAsingLagiDipelajari = "";
        alur.scrollTop = alur.scrollHeight;
    }
